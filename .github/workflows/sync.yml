name: Zotero Sync

on:
  schedule:
    - cron: '0 * * * *'  # Run hourly
  workflow_dispatch:  # Allow manual trigger
  push:
    paths:
      - '.github/workflows/sync.yml'
      - 'src/zotero-api-sync.js'
      - 'package.json'

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get full history
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm install
      
      - name: Configure Git
        run: |
          git config --global user.name "Zotero Sync Bot"
          git config --global user.email "zotero-sync@example.com"
      
      - name: Run Zotero sync
        env:
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_COLLECTION_ID: ${{ secrets.ZOTERO_COLLECTION_ID }}
          GIT_REPOSITORY_URL: ${{ secrets.GIT_REPOSITORY_URL }}
          GIT_NAME: "Zotero Sync Bot"
          GIT_EMAIL: "zotero-sync@example.com"
          EXPORT_PATH: "zotero-export.md"
          COMMIT_MESSAGE: "Auto-sync Zotero publications"
        run: npm start
      
      - name: Commit and push changes
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync Zotero publications $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi